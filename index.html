<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投資工具箱</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,900&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/theme.css">
</head>
<body>
  <nav class="topnav">
    <div class="mark">投資工具箱<span>Toolbox</span></div>
    <div class="navlinks" id="navlinks"></div>
    <div class="navtools">
      <button id="btn-export" title="把所有本機資料下載成 JSON 備份">匯出</button>
      <button id="btn-import" title="從 JSON 備份還原資料">匯入</button>
      <button id="btn-clear" class="danger" title="清除本工具在此瀏覽器的所有資料">清除</button>
      <input type="file" id="file-import" accept="application/json,.json" hidden>
    </div>
  </nav>
  <main class="view-wrap" id="view"></main>
  <script type="module" src="assets/shell.js"></script>
</body>
</html>
